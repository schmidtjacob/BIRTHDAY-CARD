<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: #b30059;
    }

    h2 {
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .photo {
      width: 100%;
      max-width: 280px;
      border-radius: 20px;
      margin: 20px auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    footer {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>🎉 Happy Birthday 🎉</h1>
    <h2>ENTER NAME HERE</h2>

    <img src="1.png" alt="Birthday Photo" class="photo">

    <div class="card">
      <p>
        ENTER YOUR BIRTHDAY MESSAGE HERE.  
        This space can be personalized with loving words, memories,
        and wishes that make the day special.
      </p>
    </div>

    <div class="card">
      <p>
        💖 May your day be filled with happiness, laughter, and love.  
        Wishing you success, health, and smiles always.
      </p>
    </div>

    <footer>
      Made with ❤️
    </footer>

  </div>

</body>
</html>
